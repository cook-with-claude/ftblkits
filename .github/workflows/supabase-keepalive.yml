name: Supabase keep-alive

# Free-tier Supabase projects auto-pause after ~7 days of inactivity, which
# takes the storefront's catalog offline. This workflow pings the REST API on a
# schedule so the inactivity timer keeps resetting and the project stays awake.
#
# Runs on GitHub's servers — no local machine required, no Claude usage.
# URL + publishable (anon) key live in repo secrets: SUPABASE_URL,
# SUPABASE_PUBLISHABLE_KEY.

on:
  schedule:
    # Every 3 days at 06:00 UTC (well inside the ~7-day pause window).
    - cron: "0 6 */3 * *"
  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/products?select=id&limit=1" \
            -H "apikey: ${SUPABASE_PUBLISHABLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_PUBLISHABLE_KEY}")
          echo "Supabase responded with HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Keep-alive ping failed (expected 200, got $code)"
            exit 1
          fi
